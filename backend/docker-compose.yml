services:
  db:
    image: postgres:16-alpine
    container_name: career-coach-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: career
      POSTGRES_PASSWORD: career
      POSTGRES_DB: career_coach
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career -d career_coach"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  db_data:
